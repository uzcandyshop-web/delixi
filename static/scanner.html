<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DELIXI</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      padding: 16px;
      min-height: 100vh;
    }
    h1 { font-size: 20px; margin-bottom: 16px; text-align: center; }
    #reader { width: 100%; max-width: 480px; margin: 0 auto 16px; border-radius: 12px; overflow: hidden; }
    .card {
      background: var(--tg-theme-secondary-bg-color, #f4f4f5);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .label { font-size: 13px; color: var(--tg-theme-hint-color, #666); margin-bottom: 6px; }
    .value { font-size: 18px; font-weight: 600; word-break: break-all; }
    input[type="number"] {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      border: 2px solid var(--tg-theme-hint-color, #ddd);
      border-radius: 10px;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
    }
    input:focus { outline: none; border-color: var(--tg-theme-button-color, #2481cc); }
    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff);
      cursor: pointer;
      margin-top: 12px;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.secondary {
      background: var(--tg-theme-secondary-bg-color, #e5e5e7);
      color: var(--tg-theme-text-color, #000);
    }
    .status { margin-top: 12px; padding: 12px; border-radius: 8px; font-size: 14px; white-space: pre-line; }
    .status.error { background: #fee; color: #c00; }
    .status.success { background: #efe; color: #070; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <h1 id="title">📸 DELIXI</h1>

  <div id="scanView">
    <div id="reader"></div>
    <div class="label" id="scanHint" style="text-align:center;"></div>
  </div>

  <div id="confirmView" class="hidden">
    <div class="card">
      <div class="label" id="qrLabel"></div>
      <div class="value" id="tokenPreview">—</div>
    </div>
    <div class="card">
      <div class="label" id="amountLabel"></div>
      <input id="amount" type="number" inputmode="numeric" min="1" step="1" placeholder="120000" autofocus>
    </div>
    <button id="submitBtn"></button>
    <button id="rescanBtn" class="secondary"></button>
  </div>

  <div id="status"></div>

  <script>
    // ----------- i18n -----------
    const I18N = {
      ru: {
        title: "📸 DELIXI Сканер",
        scan_hint: "Наведите камеру на QR-код клиента",
        qr_label: "QR отсканирован",
        amount_label: "Сумма покупки (сум)",
        submit: "Подтвердить покупку",
        rescan: "Отсканировать заново",
        enter_amount: "Введите корректную сумму",
        no_token: "QR не отсканирован",
        camera_error: "Не удалось получить доступ к камере: ",
        net_error: "Ошибка сети: ",
        accrued: (bonus, pct, balance) =>
          `✅ Начислено ${bonus} бонусов (${pct}%)\nБаланс клиента: ${balance}`,
        errors: {
          region_mismatch: (c, s) => `Регион не совпадает (клиент: ${c}, вы: ${s})`,
          invalid_qr: "QR-код недействителен",
          customer_not_found: "Клиент не найден",
          bad_amount: "Неверная сумма",
          seller_inactive: "Ваш аккаунт продавца неактивен",
          no_tiers_configured: "Бонусные тиры не настроены",
          no_matching_tier: "Нет тарифа для этой суммы",
        },
        unknown_error: (code) => `Ошибка: ${code}`,
      },
      uz: {
        title: "📸 DELIXI Skaner",
        scan_hint: "Kamerani mijozning QR-kodiga qarating",
        qr_label: "QR skanerlandi",
        amount_label: "Xarid summasi (so'm)",
        submit: "Xaridni tasdiqlash",
        rescan: "Qayta skanerlash",
        enter_amount: "To'g'ri summa kiriting",
        no_token: "QR skanerlanmagan",
        camera_error: "Kameraga ruxsat olib bo'lmadi: ",
        net_error: "Tarmoq xatosi: ",
        accrued: (bonus, pct, balance) =>
          `✅ ${bonus} bonus hisoblandi (${pct}%)\nMijoz balansi: ${balance}`,
        errors: {
          region_mismatch: (c, s) => `Viloyat mos kelmaydi (mijoz: ${c}, siz: ${s})`,
          invalid_qr: "QR-kod noto'g'ri",
          customer_not_found: "Mijoz topilmadi",
          bad_amount: "Noto'g'ri summa",
          seller_inactive: "Sotuvchi hisobingiz faol emas",
          no_tiers_configured: "Bonus darajalari sozlanmagan",
          no_matching_tier: "Bu summa uchun tarif yo'q",
        },
        unknown_error: (code) => `Xato: ${code}`,
      },
    };

    // Determine language: URL param `?lang=uz` wins, fallback to Telegram user's language_code
    const params = new URLSearchParams(window.location.search);
    let lang = (params.get("lang") || "").toLowerCase();
    if (lang !== "ru" && lang !== "uz") {
      const tgLang = (window.Telegram?.WebApp?.initDataUnsafe?.user?.language_code || "").toLowerCase();
      lang = tgLang === "uz" ? "uz" : "ru";
    }
    const L = I18N[lang];

    // Apply static translations
    document.getElementById("title").textContent = L.title;
    document.getElementById("scanHint").textContent = L.scan_hint;
    document.getElementById("qrLabel").textContent = L.qr_label;
    document.getElementById("amountLabel").textContent = L.amount_label;
    document.getElementById("submitBtn").textContent = L.submit;
    document.getElementById("rescanBtn").textContent = L.rescan;
    document.documentElement.lang = lang;

    // ----------- Scanner logic -----------
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Diagnose initData early
    const initDataOk = tg.initData && tg.initData.length > 10;
    if (!initDataOk) {
      setTimeout(() => {
        const info = [
          "⚠️ initData пустая",
          "platform=" + tg.platform,
          "version=" + tg.version,
          "initData.length=" + (tg.initData || "").length,
          "user=" + (tg.initDataUnsafe?.user?.id || "none"),
          "query_id=" + (tg.initDataUnsafe?.query_id || "none"),
          "auth_date=" + (tg.initDataUnsafe?.auth_date || "none"),
          "hash=" + (tg.initDataUnsafe?.hash ? "present" : "none"),
          "start_param=" + (tg.initDataUnsafe?.start_param || "none"),
          "location=" + location.href,
        ].join("\n");
        showStatus(info, "error");
      }, 500);
    }

    const scanView = document.getElementById('scanView');
    const confirmView = document.getElementById('confirmView');
    const tokenPreview = document.getElementById('tokenPreview');
    const amountInput = document.getElementById('amount');
    const submitBtn = document.getElementById('submitBtn');
    const rescanBtn = document.getElementById('rescanBtn');
    const statusEl = document.getElementById('status');

    let scanner = null;
    let qrToken = null;

    function showStatus(msg, type) {
      statusEl.className = 'status ' + type;
      statusEl.textContent = msg;
    }
    function clearStatus() { statusEl.className = ''; statusEl.textContent = ''; }

    async function startScanner() {
      qrToken = null;
      confirmView.classList.add('hidden');
      scanView.classList.remove('hidden');
      clearStatus();

      if (scanner) { try { await scanner.stop(); } catch {} scanner.clear(); }
      scanner = new Html5Qrcode("reader");
      try {
        await scanner.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: { width: 250, height: 250 } },
          onScanSuccess,
          () => {}
        );
      } catch (e) {
        showStatus(L.camera_error + e, "error");
      }
    }

    async function onScanSuccess(decodedText) {
      qrToken = decodedText;
      try { await scanner.stop(); } catch {}
      tokenPreview.textContent = qrToken.length > 40 ? qrToken.slice(0, 40) + '…' : qrToken;
      scanView.classList.add('hidden');
      confirmView.classList.remove('hidden');
      amountInput.focus();
      tg.HapticFeedback?.impactOccurred('medium');
    }

    function uuid() {
      if (crypto.randomUUID) return crypto.randomUUID();
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
      });
    }

    submitBtn.onclick = async () => {
      const amount = parseFloat(amountInput.value);
      if (!amount || amount <= 0) {
        showStatus(L.enter_amount, "error");
        return;
      }
      if (!qrToken) {
        showStatus(L.no_token, "error");
        return;
      }

      // Diagnostic: confirm Telegram signed this WebApp session
      if (!tg.initData || tg.initData.length < 10) {
        showStatus(
          "⚠️ Telegram initData пустая.\n" +
          "Диагностика:\n" +
          "• platform: " + (tg.platform || "unknown") + "\n" +
          "• version: " + (tg.version || "unknown") + "\n" +
          "• initData length: " + (tg.initData || "").length + "\n" +
          "• user: " + (tg.initDataUnsafe?.user?.id || "none") + "\n\n" +
          "Откройте WebApp ТОЛЬКО через кнопку 📸 в клавиатуре бота после /seller. " +
          "Menu Button от BotFather не подписывает initData.",
          "error"
        );
        submitBtn.disabled = false;
        return;
      }

      submitBtn.disabled = true;
      clearStatus();

      try {
        const res = await fetch('/api/v1/transactions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'tg ' + tg.initData,
          },
          body: JSON.stringify({
            qr_token: qrToken,
            amount: amount,
            idempotency_key: uuid(),
          }),
        });
        const data = await res.json();

        if (!res.ok) {
          const code = data.detail?.error || data.detail || 'unknown_error';
          let msg;
          if (code === 'region_mismatch') {
            msg = L.errors.region_mismatch(
              data.detail?.customer_region, data.detail?.seller_region);
          } else if (L.errors[code]) {
            msg = L.errors[code];
          } else {
            msg = L.unknown_error(code);
          }
          showStatus(msg, "error");
          tg.HapticFeedback?.notificationOccurred('error');
          return;
        }

        const fmt = n => new Intl.NumberFormat(lang === 'uz' ? 'uz-UZ' : 'ru-RU').format(n);
        showStatus(
          L.accrued(fmt(data.bonus_amount), data.bonus_percent, fmt(data.balance_after)),
          "success"
        );
        tg.HapticFeedback?.notificationOccurred('success');
        amountInput.value = '';
        setTimeout(() => startScanner(), 2000);
      } catch (e) {
        showStatus(L.net_error + e.message, "error");
      } finally {
        submitBtn.disabled = false;
      }
    };

    rescanBtn.onclick = startScanner;

    startScanner();
  </script>
</body>
</html>
