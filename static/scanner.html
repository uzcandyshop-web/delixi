<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>DELIXI — Сканер</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--tg-theme-bg-color, #ffffff);
      color: var(--tg-theme-text-color, #000000);
      padding: 16px;
      min-height: 100vh;
    }
    h1 { font-size: 20px; margin-bottom: 16px; text-align: center; }
    #reader { width: 100%; max-width: 480px; margin: 0 auto 16px; border-radius: 12px; overflow: hidden; }
    .card {
      background: var(--tg-theme-secondary-bg-color, #f4f4f5);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    .label { font-size: 13px; color: var(--tg-theme-hint-color, #666); margin-bottom: 6px; }
    .value { font-size: 18px; font-weight: 600; word-break: break-all; }
    input[type="number"] {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      border: 2px solid var(--tg-theme-hint-color, #ddd);
      border-radius: 10px;
      background: var(--tg-theme-bg-color, #fff);
      color: var(--tg-theme-text-color, #000);
    }
    input:focus { outline: none; border-color: var(--tg-theme-button-color, #2481cc); }
    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      background: var(--tg-theme-button-color, #2481cc);
      color: var(--tg-theme-button-text-color, #fff);
      cursor: pointer;
      margin-top: 12px;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    button.secondary {
      background: var(--tg-theme-secondary-bg-color, #e5e5e7);
      color: var(--tg-theme-text-color, #000);
    }
    .status { margin-top: 12px; padding: 12px; border-radius: 8px; font-size: 14px; }
    .status.error { background: #fee; color: #c00; }
    .status.success { background: #efe; color: #070; }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <h1>📸 DELIXI Сканер</h1>

  <div id="scanView">
    <div id="reader"></div>
    <div class="label" style="text-align:center;">Наведите камеру на QR-код клиента</div>
  </div>

  <div id="confirmView" class="hidden">
    <div class="card">
      <div class="label">QR отсканирован</div>
      <div class="value" id="tokenPreview">—</div>
    </div>
    <div class="card">
      <div class="label">Сумма покупки (сум)</div>
      <input id="amount" type="number" inputmode="numeric" min="1" step="1" placeholder="120000" autofocus>
    </div>
    <button id="submitBtn">Подтвердить покупку</button>
    <button id="rescanBtn" class="secondary">Отсканировать заново</button>
    <div id="status"></div>
  </div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    const scanView = document.getElementById('scanView');
    const confirmView = document.getElementById('confirmView');
    const tokenPreview = document.getElementById('tokenPreview');
    const amountInput = document.getElementById('amount');
    const submitBtn = document.getElementById('submitBtn');
    const rescanBtn = document.getElementById('rescanBtn');
    const statusEl = document.getElementById('status');

    let scanner = null;
    let qrToken = null;

    function showStatus(msg, type) {
      statusEl.className = 'status ' + type;
      statusEl.textContent = msg;
    }
    function clearStatus() { statusEl.className = ''; statusEl.textContent = ''; }

    async function startScanner() {
      qrToken = null;
      confirmView.classList.add('hidden');
      scanView.classList.remove('hidden');
      clearStatus();

      if (scanner) { try { await scanner.stop(); } catch {} scanner.clear(); }
      scanner = new Html5Qrcode("reader");
      try {
        await scanner.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: { width: 250, height: 250 } },
          onScanSuccess,
          () => {}  // ignore per-frame decode failures
        );
      } catch (e) {
        showStatus("Не удалось получить доступ к камере: " + e, "error");
      }
    }

    async function onScanSuccess(decodedText) {
      qrToken = decodedText;
      try { await scanner.stop(); } catch {}
      tokenPreview.textContent = qrToken.length > 40 ? qrToken.slice(0, 40) + '…' : qrToken;
      scanView.classList.add('hidden');
      confirmView.classList.remove('hidden');
      amountInput.focus();
      tg.HapticFeedback?.impactOccurred('medium');
    }

    function uuid() {
      if (crypto.randomUUID) return crypto.randomUUID();
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
      });
    }

    submitBtn.onclick = async () => {
      const amount = parseFloat(amountInput.value);
      if (!amount || amount <= 0) {
        showStatus("Введите корректную сумму", "error");
        return;
      }
      if (!qrToken) {
        showStatus("QR не отсканирован", "error");
        return;
      }
      submitBtn.disabled = true;
      clearStatus();

      try {
        const res = await fetch('/api/v1/transactions', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'Authorization': 'tg ' + tg.initData,
          },
          body: JSON.stringify({
            qr_token: qrToken,
            amount: amount,
            idempotency_key: uuid(),
          }),
        });
        const data = await res.json();

        if (!res.ok) {
          const code = data.detail?.error || data.detail || 'unknown_error';
          const messages = {
            region_mismatch: `Регион не совпадает (клиент: ${data.detail?.customer_region}, вы: ${data.detail?.seller_region})`,
            invalid_qr: "QR-код недействителен",
            customer_not_found: "Клиент не найден",
            bad_amount: "Неверная сумма",
            seller_inactive: "Ваш аккаунт продавца неактивен",
            no_tiers_configured: "Бонусные тиры не настроены",
            no_matching_tier: "Нет тарифа для этой суммы",
          };
          showStatus(messages[code] || `Ошибка: ${code}`, "error");
          tg.HapticFeedback?.notificationOccurred('error');
          return;
        }

        const fmt = n => new Intl.NumberFormat('ru-RU').format(n);
        showStatus(
          `✅ Начислено ${fmt(data.bonus_amount)} бонусов (${data.bonus_percent}%)\n` +
          `Баланс клиента: ${fmt(data.balance_after)}`,
          "success"
        );
        tg.HapticFeedback?.notificationOccurred('success');
        amountInput.value = '';
        setTimeout(() => startScanner(), 2000);
      } catch (e) {
        showStatus("Ошибка сети: " + e.message, "error");
      } finally {
        submitBtn.disabled = false;
      }
    };

    rescanBtn.onclick = startScanner;

    // Go!
    startScanner();
  </script>
</body>
</html>
